    <script>
        // Função para preservar UTMs
        function addUtm(url) {
            const p = window.location.search;
            return p ? url + (url.includes('?') ? '&' : '?') + p.substring(1) : url;
        }
        

        // Atualizar todos os links para preservar UTMs
        function updateAllLinks() {
            const links = document.querySelectorAll('a[href^="modelos.html"]');
            links.forEach(link => {
                const aro = link.getAttribute('data-aro');
                if (aro) {
                    const baseUrl = `modelos.html?aro=${aro}`;
                    link.href = addUtm(baseUrl);
                    link.title = `Selecionar pneus Aro ${aro}`;
                } else {
                    const originalHref = link.getAttribute('href');
                    if (originalHref) {
                        link.href = addUtm(originalHref);
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Atualizar todos os links
            updateAllLinks();
        });
    </script>
