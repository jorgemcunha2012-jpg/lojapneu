        .header-logo {

        }

        .header-logo img {

        }

        .header-search {
            flex: 1;
            max-width: 600px;
            margin: 0 16px;
            position: relative;
        }

        .header-search svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: #666;
            z-index: 10;
            pointer-events: none;
        }

        .header-search input {
            width: 100%;
            padding: 10px 12px 10px 40px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            background: white;
            color: #666;
        }

        .header-search input::placeholder {
            color: #999;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-menu-icon,
        .header-cart-icon {
            width: 24px;
            height: 24px;
            color: #333;
            cursor: pointer;
        }

        .header-cart {
            position: relative;
        }

        .header-cart-badge {
            position: absolute;
            top: -4px;

            padding-left: 16px;
            display: flex;
            align-items: center;

        .header-bottom svg {

            height: 16px;
            color: #333;
        }

        .header-bottom span {
            font-size: 14px;
            color: #333;
        }

        .breadcrumb {
            background-color: #fff;
            padding: 12px 20px;

            color: #666;
            border-bottom: 1px solid #e0e0e0;
        }

        .breadcrumb a {
            color: #3483fa;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .banner-section {

            background-color: #fef159;
            margin: 0;
            padding: 0;
            display: block;
            line-height: 0;
        }

        .banner-wrapper {

            width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        .banner-image {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            vertical-align: top;
            margin: 0;
            padding: 0;

    <script>
        // Função para preservar UTMs
        function addUtm(url) {
            const p = window.location.search;
            return p ? url + (url.includes('?') ? '&' : '?') + p.substring(1) : url;
        }
        
        // Função para atualizar banner baseado no aro
        function atualizarBanner(aro) {
            const bannerImage = document.getElementById('banner-image');
            if (!bannerImage) return;
            
            // Usar sempre o banner 99,90
            bannerImage.src = 'images/banner 99,90.png';
            bannerImage.alt = 'Banner Promocional R$ 99,90';
        }
        
        // Função para inicializar a página
        function inicializarPagina() {
        // Configuração de produtos por aro - usando imagens reais de cada pasta
        const produtosPorAro = {
            '13': [
                { size: '175/75R13', image: 'images/aro 13/175_75r13.png', price: '99,90' },
                { size: '175/70R13', image: 'images/aro 13/175_70r13.png', price: '99,90' },
                { size: '175/60R13', image: 'images/aro 13/175_60r13.png', price: '99,90' },
                { size: '165/70R13', image: 'images/aro 13/165_70r13.png', price: '99,90' }
            ],
            '14': [
                { size: '175/80R14', image: 'images/aro14/175_80r14.png', price: '99,90' },
                { size: '175/75R14', image: 'images/aro14/175_75r14.png', price: '99,90' },
                { size: '175/70R14', image: 'images/aro14/175_70r14.png', price: '99,90' },
                { size: '175/65R14', image: 'images/aro14/175_65r14.png', price: '99,90' },
                { size: '185/70R14', image: 'images/aro14/185_70r14.png', price: '99,90' },
                { size: '185/65R14', image: 'images/aro14/185_65r14.png', price: '99,90' }
            ],
            '15': [
                { size: '195/60R15', image: 'images/aro 15/195_60r15.png', price: '99,90' },
                { size: '195/55R15', image: 'images/aro 15/195_55r15.png', price: '99,90' },
                { size: '185/65R15', image: 'images/aro 15/185_65r15.png', price: '99,90' },
                { size: '185/60R15', image: 'images/aro 15/185_60r15.png', price: '99,90' }
            ],
            '16': [
                { size: '215/65R16', image: 'images/aro16/215_65r16.png', price: '99,90' },
                { size: '205/60R16', image: 'images/aro16/205_60r16.png', price: '99,90' },
                { size: '205/55R16', image: 'images/aro16/205_55r16.png', price: '99,90' },
                { size: '185/55R16', image: 'images/aro16/185_55r16.png', price: '99,90' }
            ],
            '17': [
                { size: '225/65R17', image: 'images/aro17/225_65r17.png', price: '99,90' },
                { size: '215/60R17', image: 'images/aro17/215_60r17.png', price: '99,90' },
                { size: '215/50R17', image: 'images/aro17/215_50r17.png', price: '99,90' },
                { size: '205/55R17', image: 'images/aro17/205_55r17.png', price: '99,90' },
                { size: '205/50R17', image: 'images/aro17/205_50r17.png', price: '99,90' }
            ]
        };

        // Obter o aro da URL
        const urlParams = new URLSearchParams(window.location.search);
        const aro = urlParams.get('aro') || '13';

        // Atualizar banner baseado no aro
        atualizarBanner(aro);

        // Atualizar título da página
        document.title = `Pneus Aro ${aro} - Mercado Livre`;

        // Atualizar título e breadcrumb
        const aroTitleElement = document.getElementById('aro-title');
        const breadcrumbAroElement = document.getElementById('breadcrumb-aro');
        
        if (aroTitleElement) {
            aroTitleElement.textContent = aro;
        }
        if (breadcrumbAroElement) {
            breadcrumbAroElement.textContent = `Aro ${aro}`;
        }

        // Obter produtos do aro selecionado
        const produtos = produtosPorAro[aro] || produtosPorAro['13'];
        const totalProdutos = produtos.length;

        // Atualizar contadores
        const totalProductsElement = document.getElementById('total-products');
        const showingEndElement = document.getElementById('showing-end');
        
        if (totalProductsElement) {
            totalProductsElement.textContent = totalProdutos;
        }
        if (showingEndElement) {
            showingEndElement.textContent = totalProdutos;
        }

        // Renderizar produtos
        const productsGrid = document.getElementById('products-grid');
        if (productsGrid && produtos.length > 0) {
            produtos.forEach(produto => {
                const card = document.createElement('a');
                const baseUrl = `produto.html?aro=${aro}&size=${encodeURIComponent(produto.size)}`;
                card.href = addUtm(baseUrl);
                card.className = 'product-card';
                
                const installment = (parseFloat(produto.price.replace(',', '.')) / 12).toFixed(2).replace('.', ',');
                
                card.innerHTML = `
                    <img src="${produto.image}" alt="${produto.size}" class="product-image">
                    <div class="product-size">${produto.size}</div>
                    <div class="product-brand">Pirelli</div>
                    <div class="product-promo">Promoção [Entrega...</div>
                    <div class="product-price">R$ ${produto.price}</div>
                    <div class="product-installment">12x de R$ ${installment}</div>
                `;
                
                productsGrid.appendChild(card);
            });
        } else if (productsGrid) {
            productsGrid.innerHTML = '<p style="padding: 20px; text-align: center; color: #666;">Nenhum produto encontrado.</p>';
        }
        } // Fim da função inicializarPagina

        // Executar quando o DOM estiver pronto
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', inicializarPagina);
        } else {
            // DOM já está carregado, executar imediatamente
            inicializarPagina();
        }
    </script>
